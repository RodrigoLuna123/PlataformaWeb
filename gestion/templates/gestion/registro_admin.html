{% extends "gestion/base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-danger shadow">
            <div class="card-header bg-danger text-white"><h4>🛡️ Registro de Administrador</h4></div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <label>Nombre del Administrador</label>
                    <input type="text" name="nombre" class="form-control mb-3" required>
                    <label>Correo Institucional</label>
                    <input type="email" name="email" class="form-control mb-4" required>
                    <button type="submit" class="btn btn-danger w-100">Dar de Alta Admin</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
